<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

        <div>
            <style>body{background-color: blueviolet;text-align: center;}</style>
            <u><h1>Register Form</h1></u>
            <br><br>
            <label for=""><i class="fa-solid fa-user fa-beat"></i>Username:</label>
            <input type="text" placeholder="Username please">
            <br><br>
            <label for=""><i class="fa-solid fa-calendar fa-beat"></i>Age:</label>
            <input type="text" placeholder="Age please">
            <br><br>
            <label for=""><i class="fa-solid fa-house fa-beat"></i>Address:</label>
            <textarea name="" id="" placeholder="Type your address here...."></textarea>
            <br><br>
            <label for=""><i class="fa-solid fa-calendar fa-beat"></i>Date of Birth:</label>
            <input type="date">
            <br><br>
            <label for=""><i class="fa-solid fa-envelope fa-beat"></i>Email:</label>
            <input type="email" placeholder="xyz@gmail.com">
            <br><br>
            <label for=""><i class="fa-solid fa-circle-user fa-beat"></i>Gender:</label>
            <input name="Gender" type="radio">
            <label for="">Male</label>
            <input name="Gender" type="radio">
            <label for="">Female</label>
            <input name="Gender" type="radio">
            <label for="">Others</label>
            <br><br>
            <label for="">Select Hobbies:</label>
            <input type="checkbox">
            <label for="">Gaming</label>
            <input type="checkbox">
            <label for="">Reading</label>
            <input type="checkbox">
            <label for="">Cooking</label>
            <br><br>
            <label for="">Choose place:</label>
            <select name="" id="">
                <option value="">Choose a place</option>
                <option value="">Calicut</option>
                <option value="">Malappuram</option>
                <option value="">Kannur</option>
            </select>
            <br><br>
            <label for=""><i class="fa-solid fa-file fa-beat"></i>Upload CV:</label>
            <input type="file">
            <br><br>
            <button>Submit</button>
            <button>Cancel</button>
        </div>
    


    
</body>
</html>
