<body>
    <!-- form -->
    <form action="">
        <label for="uname">Username</label>
        <input id="uname" type="text" placeholder="Username"><br><br> 
         <!-- placeholder for show hint -->
          <!-- by giving for and id same , then when select an field it will highlight -->

        <label for="uname">Email</label>
        <input id="" type="email" placeholder="Email"><br><br>
        <!-- email type only allow to enter emails -->

        <label for="">Password</label>
        <input type="password" placeholder="Password"><br><br>
        <!-- password type will mask typing password -->

        <label for="">Address</label>
        <textarea name="" id="" placeholder="Address"></textarea><br><br>

        <label for="">DOB</label>
        <input type="date"><br><br>
        <!-- date type show a date picker -->
        
        
    </form>
